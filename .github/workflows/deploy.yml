name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        env:
          VITE_BASE_PATH: "/aroma-glow-guide/"
        run: npm run build

      - name: Locate and prepare build artifacts
        run: |
          if [ -d ".output/public" ]; then
            echo "OUTPUT_DIR=.output/public" >> $GITHUB_ENV
            DIR=".output/public"
          elif [ -d "dist" ]; then
            echo "OUTPUT_DIR=dist" >> $GITHUB_ENV
            DIR="dist"
          elif [ -d "build" ]; then
            echo "OUTPUT_DIR=build" >> $GITHUB_ENV
            DIR="build"
          else
            echo "Could not find build folder!"
            exit 1
          fi
          touch "$DIR/.nojekyll"
          if [ -f "$DIR/index.html" ]; then
            cp "$DIR/index.html" "$DIR/404.html"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUTPUT_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
