name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        env:
          VITE_BASE_PATH: "/aroma-glow-guide/"
          NITRO_PRESET: node-server
        run: npm run build

      - name: Prerender HTML for GitHub Pages
        run: |
          PORT=3000 node .output/server/index.mjs &
          SERVER_PID=$!
          sleep 4
          mkdir -p .output/public
          echo "Testing server response..."
          curl -i http://localhost:3000/aroma-glow-guide/ || true
          curl -s http://localhost:3000/aroma-glow-guide/ > .output/public/index.html
          if [ ! -s .output/public/index.html ]; then
            curl -s http://localhost:3000/ > .output/public/index.html
          fi
          cp .output/public/index.html .output/public/404.html
          touch .output/public/.nojekyll
          echo "OUTPUT_DIR=.output/public" >> $GITHUB_ENV
          kill $SERVER_PID || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
