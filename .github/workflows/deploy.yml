name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        env:
          VITE_BASE_PATH: "/aroma-glow-guide/"
          NITRO_PRESET: node-server
        run: npm run build

      - name: Prerender HTML for GitHub Pages
        run: |
          PORT=3000 bun dist/server/server.js &
          SERVER_PID=$!
          sleep 4
          mkdir -p dist/client
          echo "Testing server response..."
          curl -i http://localhost:3000/aroma-glow-guide/ || true
          curl -s http://localhost:3000/aroma-glow-guide/ > dist/client/index.html
          if [ ! -s dist/client/index.html ]; then
            curl -s http://localhost:3000/ > dist/client/index.html
          fi
          cp dist/client/index.html dist/client/404.html
          touch dist/client/.nojekyll
          echo "OUTPUT_DIR=dist/client" >> $GITHUB_ENV
          kill $SERVER_PID || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
